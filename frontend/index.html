<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Finance Tracker</title>

    <link rel="stylesheet" href="/static/style.css">

    <link rel="manifest" href="/static/manifest.json">

    <meta name="theme-color" content="#000000">

</head>


<body>


<div class="app-container">


    <!-- DASHBOARD PAGE -->

    <div id="dashboardPage">


        <div class="header">

            <h1>
                Finance Tracker
            </h1>

        </div>



        <div class="card balance-card">

            <h2>
                Current Balance
            </h2>


            <div class="balance" id="balance">
                £0.00
            </div>


            <p id="openingBalance"></p>

        </div>




        <div class="summary-row">


            <div class="card summary-card">

                <div class="summary-title">
                    Income
                </div>


                <div class="summary-value income"
                     id="income">
                    £0.00
                </div>

            </div>



            <div class="card summary-card">

                <div class="summary-title">
                    Spent
                </div>


                <div class="summary-value expense"
                     id="expenses">
                    £0.00
                </div>

            </div>


        </div>





        <button onclick="showAddTransaction()">
            + Add Transaction
        </button>




        <div id="addTransaction" style="display:none;">


            <h2>
                Add Transaction
            </h2>


            <input id="amount"
                   type="number"
                   placeholder="Amount">



            <select id="type">

                <option value="expense">
                    Expense
                </option>

                <option value="income">
                    Income
                </option>

            </select>



            <input id="category"
                   placeholder="Category">



            <input id="merchant"
                   placeholder="Merchant">



            <input id="date"
                   type="date">



            <input id="notes"
                   placeholder="Notes">



            <button onclick="addTransaction()">
                Save
            </button>


        </div>





        <h2>
            Recent Transactions
        </h2>


        <div id="transactions"></div>



    </div>





    <!-- HISTORY PAGE -->


    <div id="historyPage" style="display:none;">


        <div class="header">

            <h1>
                Transactions
            </h1>


            <p>
                All your spending
            </p>


        </div>



        <div id="allTransactions"></div>



    </div>





</div>





<!-- BOTTOM NAVIGATION -->


<div class="bottom-nav">


    <div class="nav-item"
         onclick="showHome()">

        <span>
            🏠
        </span>

        Home

    </div>




    <div class="nav-item"
         onclick="showAddTransaction()">

        <span>
            ➕
        </span>

        Add

    </div>




    <div class="nav-item"
         onclick="showHistory()">

        <span>
            📋
        </span>

        History

    </div>




    <div class="nav-item">

        <span>
            ⚙️
        </span>

        Settings

    </div>


</div>




<script src="/static/app.js"></script>


</body>

</html>
